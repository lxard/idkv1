<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lux Store</title>

<style>
html {
    scroll-behavior: smooth;
}

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(180deg, #0a0f1c, #05070d);
    color: white;
    overflow-x: hidden;
}

/* GLOW AFTER RAIN */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at top, rgba(0,255,255,0.15), transparent 60%);
    animation: glow 6s infinite alternate;
    z-index: -1;
}

@keyframes glow {
    from { opacity: 0.2; }
    to { opacity: 0.7; }
}

/* CONTAINER */
.container {
    max-width: 480px;
    margin: auto;
    padding: 15px;
}

/* TITLE */
h2 {
    text-align: center;
    margin-bottom: 20px;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    padding: 15px;
    border-radius: 15px;
    margin-bottom: 15px;
    box-shadow: 0 0 20px rgba(0,255,200,0.2);
    transform: translateY(30px);
    opacity: 0;
    transition: 0.6s;
}

.card.show {
    transform: translateY(0);
    opacity: 1;
}

/* TEXT */
.price {
    font-size: 18px;
    color: #00ffc3;
    font-weight: bold;
}

.label {
    padding: 5px 10px;
    border-radius: 10px;
    font-size: 12px;
    display: inline-block;
    margin-top: 5px;
}

.garansi { background: #00c853; }
.nogaransi { background: #ff1744; }

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 12px;
    background: #00ffc3;
    color: black;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 0 12px #00ffc3;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.05);
}

/* SECTION */
.section {
    margin-top: 50px;
}
</style>
</head>

<body>

<div class="container">

    <!-- PRODUK -->
    <h2>Produk Premium</h2>

    <!-- PRODUK 1 -->
    <div class="card">
        <h3>Alight Motion 1Thn Priv</h3>
        <div class="price">Rp10.000</div>
        <span class="label garansi">Garansi</span>

        <!-- GANTI LINK WA -->
        <button onclick="window.location.href='https://wa.me/6285921967820'">
            Beli Sekarang
        </button>
    </div>

    <!-- PRODUK 2 -->
    <div class="card">
        <h3>Alight Motion 1Thn Shar</h3>
        <div class="price">Rp5.000</div>
        <span class="label nogaransi">No Garansi</span>

        <button onclick="window.location.href='https://wa.me/6285921967820'">
            Beli Sekarang
        </button>
    </div>


    <!-- DAGET -->
    <div class="section">
        <h2>Dana Kaget 🎁</h2>

        <!-- DAGET 1 -->
        <div class="card">
            <h3>Rp1.000</h3>

            <!-- GANTI LINK DANA KAGET -->
            <button onclick="window.location.href=''">
                Klaim Dana
            </button>
        </div>
    </div>

</div>

<script>
// SCROLL ANIMATION
const cards = document.querySelectorAll('.card');

function reveal() {
    const trigger = window.innerHeight * 0.9;

    cards.forEach(card => {
        const top = card.getBoundingClientRect().top;
        if (top < trigger) {
            card.classList.add('show');
        }
    });
}

window.addEventListener('scroll', reveal);
reveal();
</script>

</body>
</html>
